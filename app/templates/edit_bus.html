{% extends "base.html" %}

{% block content %}

<h2>Edit Bus</h2>

<form method="POST">

<div class="row">

<div class="col-md-6 mb-3">

<label>Bus Name</label>

<input
type="text"
name="bus_name"
class="form-control"
value="{{ bus.bus_name }}"
required>

</div>

<div class="col-md-6 mb-3">

<label>Bus Number</label>

<input
type="text"
name="bus_number"
class="form-control"
value="{{ bus.bus_number }}"
required>

</div>

<div class="col-md-6 mb-3">

<label>Source</label>

<input
type="text"
name="source"
class="form-control"
value="{{ bus.source }}"
required>

</div>

<div class="col-md-6 mb-3">

<label>Destination</label>

<input
type="text"
name="destination"
class="form-control"
value="{{ bus.destination }}"
required>

</div>

<div class="col-md-6 mb-3">

<label>Departure Time</label>

<input
type="time"
name="departure_time"
class="form-control"
value="{{ bus.departure_time }}"
required>

</div>

<div class="col-md-6 mb-3">

<label>Arrival Time</label>

<input
type="time"
name="arrival_time"
class="form-control"
value="{{ bus.arrival_time }}"
required>

</div>

<div class="col-md-6 mb-3">

<label>Total Seats</label>

<input
type="number"
name="total_seats"
class="form-control"
value="{{ bus.total_seats }}"
required>

</div>

<div class="col-md-6 mb-3">

<label>Available Seats</label>

<input
type="number"
name="available_seats"
class="form-control"
value="{{ bus.available_seats }}"
required>

</div>

<div class="col-md-6 mb-3">

<label>Price</label>

<input
type="number"
step="0.01"
name="price"
class="form-control"
value="{{ bus.price }}"
required>

</div>

<button class="btn btn-primary">

Update Bus

</button>

</form>

{% endblock %}
