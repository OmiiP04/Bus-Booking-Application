{% extends "base.html" %}

{% block content %}

<h2>Select Seat</h2>

<hr>

<h4>

{{ bus.bus_name }}

</h4>

<p>

{{ bus.source }}

→

{{ bus.destination }}

</p>

<div class="row">

{% for seat in range(1, bus.total_seats+1) %}

<div class="col-md-2 mb-3">

{% if seat in booked_seats %}

<button
class="btn btn-danger w-100"
disabled>

{{ seat }}

</button>

{% else %}

<a
href="/confirm-booking/{{ bus.id }}/{{ seat }}"
class="btn btn-success w-100">

{{ seat }}

</a>

{% endif %}

</div>

{% endfor %}

</div>

{% endblock %}
